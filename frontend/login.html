<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vidrería George</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:       #0d3b66;
            --navy-mid:   #1a5276;
            --navy-light: #2563a6;
            --accent:     #00c6ff;
            --bg:         #f0f4f9;
            --card:       #ffffff;
            --text:       #1a2740;
            --muted:      #7a90a8;
            --border:     #d6e4f0;
            --danger:     #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ── FONDO DECORATIVO ── */
        body::before {
            content: '';
            position: fixed;
            top: -120px; left: -120px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,59,102,.12), transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,198,255,.08), transparent 70%);
            pointer-events: none;
        }

        /* ── CARD ── */
        .login-card {
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 8px 50px rgba(13,59,102,.13);
            padding: 2.75rem 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardIn .4s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── BRAND ── */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            border-radius: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(13,59,102,.25);
        }
        .brand h1 {
            font-size: 1.35rem; font-weight: 700; color: var(--navy);
            letter-spacing: -.01em;
        }
        .brand p {
            font-size: .82rem; color: var(--muted);
            margin-top: .2rem;
        }

        .divider {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .divider hr { flex: 1; border: none; border-top: 1.5px solid var(--border); }
        .divider span {
            font-size: .72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .1em; color: var(--muted);
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 1.1rem; }
        .form-group label {
            display: block; font-size: .75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .08em;
            color: var(--muted); margin-bottom: .45rem;
        }

        .input-wrap {
            position: relative;
        }
        .input-wrap .input-icon {
            position: absolute; left: .9rem; top: 50%;
            transform: translateY(-50%);
            font-size: 1rem; pointer-events: none;
            opacity: .5;
        }
        .input-wrap input {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: .75rem 1rem .75rem 2.6rem;
            font-family: inherit;
            font-size: .95rem;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border .2s, box-shadow .2s;
        }
        .input-wrap input:focus {
            border-color: var(--navy-light);
            box-shadow: 0 0 0 3px rgba(37,99,166,.12);
        }
        .input-wrap input::placeholder { color: #b0bec5; }

        /* toggle password */
        .toggle-pass {
            position: absolute; right: .9rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 1rem; opacity: .4; transition: opacity .2s;
            padding: 0;
        }
        .toggle-pass:hover { opacity: .8; }

        /* ── BTN ── */
        .btn-login {
            width: 100%; padding: .85rem;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: #fff; border: none; border-radius: 12px;
            font-family: inherit; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-top: .5rem;
            transition: all .25s;
            box-shadow: 0 4px 18px rgba(13,59,102,.3);
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13,59,102,.4);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }

        /* ── ERROR ── */
        .error-msg {
            display: none;
            background: rgba(220,38,38,.08);
            border: 1.5px solid rgba(220,38,38,.2);
            border-radius: 10px;
            padding: .7rem 1rem;
            color: var(--danger);
            font-size: .85rem;
            font-weight: 500;
            text-align: center;
            margin-top: 1rem;
            animation: shake .35s ease;
        }
        .error-msg.show { display: block; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }

        /* ── SPINNER INSIDE BTN ── */
        .btn-spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }
        .btn-login.loading .btn-text  { display: none; }
        .btn-login.loading .btn-spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card">

    <!-- BRAND -->
    <div class="brand">
        <div class="logo">🪟</div>
        <h1>Vidrería George</h1>
        <p>Sistema de Facturación</p>
    </div>

    <div class="divider">
        <hr><span>Iniciar sesión</span><hr>
    </div>

    <!-- FORM -->
    <form id="formLogin">

        <div class="form-group">
            <label>Usuario</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input type="text" id="usuario" placeholder="Tu nombre de usuario" autocomplete="username" required>
            </div>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrap">
                <span class="input-icon"></span>
                <input type="password" id="password" autocomplete="current-password" required>
                <button type="button" class="toggle-pass" onclick="togglePass()" id="toggleBtn"></button>
            </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">Ingresar</span>
            <div class="btn-spinner"></div>
        </button>

    </form>

    <div class="error-msg" id="errorMsg"></div>

</div>

<script>
const API = "../backend/auth/login.php";

// Toggle contraseña visible
function togglePass() {
    const input = document.getElementById("password");
    const btn   = document.getElementById("toggleBtn");
    if(input.type === "password"){
        input.type = "text";
        btn.textContent = "";
    } else {
        input.type = "password";
        btn.textContent = "";
    }
}


document.getElementById("formLogin").addEventListener("submit", function(e){
    e.preventDefault();

    const btn    = document.getElementById("btnLogin");
    const errMsg = document.getElementById("errorMsg");

    // Loading state
    btn.classList.add("loading");
    btn.disabled = true;
    errMsg.classList.remove("show");

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            usuario:  document.getElementById("usuario").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            if(data.rol === "Administrador"){
                window.location.href = "dashboard_admin.php";
            } else {
                window.location.href = "dashboard_trabajador.php";
            }
        } else {
            btn.classList.remove("loading");
            btn.disabled = false;
            errMsg.textContent = data.mensaje || "Usuario o contraseña incorrectos";
            errMsg.classList.add("show");
        }
    })
    .catch(() => {
        btn.classList.remove("loading");
        btn.disabled = false;
        errMsg.textContent = "Error de conexión. Intenta de nuevo.";
        errMsg.classList.add("show");
    });
});
</script>

</body>
</html>
