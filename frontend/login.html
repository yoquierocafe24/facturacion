<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f4f6f9;">

<div class="container mt-5">
    <div class="card col-md-4 mx-auto p-4 shadow-lg border-0">

<h2 class="text-center fw-bold" style="color: #0d3b66;">
    VIDRERÍA GEORGE </h2>
        <h5 class="text-center text-muted mb-3">Sistema de Facturación</h5>
        <hr>
        <h3 class="text-center">Iniciar Sesión</h3>

        <form id="formLogin">
            <input type="text" id="usuario" placeholder="Usuario" class="form-control mb-3" required>
            <input type="password" id="password" placeholder="Contraseña" class="form-control mb-3" required>  
<button class="btn w-100 text-white" style="background-color: #0d3b66;">
    Ingresar </button>
        </form>

        <div id="mensaje" class="mt-3 text-danger text-center"></div>
    </div>
</div>

<script>
const API = "../backend/auth/login.php";

document.getElementById("formLogin").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(API, {
        method: "POST",
        body: JSON.stringify({
            usuario: usuario.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){

            if(data.rol === "Administrador"){
                window.location.href = "dashboard_admin.php";
            } else {
                window.location.href = "dashboard_trabajador.php";
            }

        } else {
            mensaje.innerText = data.mensaje;
        }
    });
});
</script>

</body>
</html>
